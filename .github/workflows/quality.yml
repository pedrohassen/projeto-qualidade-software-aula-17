# .github/workflows/quality.yml
name: Quality Check
on:
  push:
  pull_request:
jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
    with:
      python-version: &quot;3.12&quot;
    
    - name: Instalar dependencias
    run: |
      pip install pytest
      pip install pytest-bdd
      
    - name: Executar testes
    run: pytest